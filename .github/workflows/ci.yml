name: CI

on:
  push:
    branches: [beta]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      # Pinned to the workspace MSRV so CI agrees byte-for-byte with the local
      # fmt/clippy gates. A floating stable runner repeatedly broke pushes with
      # lints the pinned toolchain does not carry; the advisory job below tracks
      # stable drift without gating integration.
      RUSTUP_TOOLCHAIN: 1.89.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install 1.89.0 --profile minimal --component clippy --component rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      # --all-features enables marrow-store's `native` (redb) backend so the
      # native engine and its conformance suite are gated alongside the memory
      # backend. The reduced workspace is exactly marrow-codes, marrow-syntax,
      # marrow-store, and the thin marrow CLI.
      - name: Build
        run: cargo build --workspace --all-targets --all-features --locked

      # Runs the retained-crate tests, including the standing anti-legacy tidy
      # gate (marrow-codes) that asserts the workspace membership and the absence
      # of every forbidden legacy family from the tracked source. The
      # differential-oracle harness's binary-invoking test is #[ignore], so CI
      # never requires the archived oracle.
      - name: Test
        run: cargo test --workspace --all-targets --all-features --locked

      - name: Clippy and unsafe check
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings -F unsafe-code

  stable-advisory:
    name: Rust (stable advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component clippy --component rustfmt

      # Early warning for upcoming-toolchain lint drift; never gates a push.
      - name: Clippy (stable, advisory)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings -F unsafe-code

  supply-chain-advisory:
    name: Supply chain (advisory)
    runs-on: ubuntu-latest
    # Non-gating, like stable-advisory: an upstream RustSec advisory or SBOM
    # tooling change must never red the required matrix or block a push. A real
    # advisory here is a finding to triage, not an integration stop. cargo-audit
    # and cargo-cyclonedx are CI-only tool installs; neither is a workspace
    # dependency, and neither touches Cargo.lock.
    continue-on-error: true
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install advisory tools
        run: cargo install cargo-audit cargo-cyclonedx --locked

      # Scans the committed Cargo.lock against the RustSec advisory database.
      - name: Audit dependencies
        run: cargo audit

      # Emits a CycloneDX SBOM per crate from cargo metadata; does not build or
      # resolve new dependencies and leaves Cargo.lock byte-unchanged.
      - name: Generate SBOM
        run: cargo cyclonedx --all --format json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: "**/*.cdx.json"
          if-no-files-found: error
