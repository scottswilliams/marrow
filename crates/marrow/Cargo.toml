[package]
name = "marrow"
description = "The Marrow command-line interface."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[[bin]]
name = "marrow"
path = "src/main.rs"

[dependencies]
marrow-codes = { path = "../marrow-codes" }
marrow-syntax = { path = "../marrow-syntax" }
marrow-catalog = { path = "../marrow-catalog" }
marrow-project = { path = "../marrow-project" }
marrow-check = { path = "../marrow-check" }
marrow-json = { path = "../marrow-json" }
marrow-run = { path = "../marrow-run" }
marrow-store = { path = "../marrow-store", features = ["native"] }
serde_json = "1"

[target.'cfg(unix)'.dependencies]
signal-hook = { version = "0.3", default-features = false }

[dev-dependencies]
# The shared fact-lookup family lives behind marrow-check's test-support feature; the
# crate is already a normal dependency, so this only flips the feature for tests.
marrow-check = { path = "../marrow-check", features = ["test-support"] }

[lints]
workspace = true
